<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Malaysian dataset - segmentacja linii</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --border: #d8dee6;
      --text: #111827;
      --muted: #5f6b7a;
      --blue: #2563a8;
      --soft: #eef4fb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .topbar {
      height: 54px;
      display: grid;
      grid-template-columns: 140px 1fr 140px;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #1f2937;
      color: #fff;
    }
    .topbar button {
      height: 36px;
      border: 0;
      border-radius: 6px;
      background: #f3f4f6;
      color: #111827;
      font-weight: 700;
      font-size: 14px;
    }
    .filename {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: #ffffff;
      color: #111827;
      font-weight: 700;
      letter-spacing: 0;
    }
    main {
      height: calc(100vh - 54px);
      display: grid;
      grid-template-columns: minmax(420px, 0.96fr) minmax(500px, 1.04fr);
      gap: 14px;
      padding: 14px;
    }
    .panel {
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }
    .panel-header {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
      background: #fbfcfe;
      font-weight: 700;
    }
    .source-wrap {
      height: calc(100% - 44px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: #f9fafb;
    }
    .source-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border: 1px solid #e5e7eb;
      background: #fff;
    }
    .right {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      min-height: 0;
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 12px;
    }
    .field label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
    }
    .field input {
      width: 100%;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      font-size: 14px;
    }
    .lines {
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .line-list {
      overflow: auto;
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .line-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .line-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
      font-size: 13px;
      font-weight: 700;
    }
    .line-body {
      display: grid;
      grid-template-columns: 1fr 1.06fr;
      gap: 10px;
      align-items: center;
      padding: 10px;
    }
    .line-body img {
      width: 100%;
      max-height: 84px;
      object-fit: contain;
      border: 1px solid #e5e7eb;
      background: #fff;
    }
    textarea {
      width: 100%;
      height: 72px;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 9px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      line-height: 1.25;
    }
    .actions {
      display: flex;
      gap: 10px;
      padding: 0 12px 12px;
    }
    .actions button {
      height: 36px;
      border: 0;
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      font-weight: 700;
      flex: 1;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <button>Poprzedni</button>
    <div class="filename">PD (93).jpg</div>
    <button>Następny</button>
  </header>

  <main>
    <section class="panel">
      <div class="panel-header">
        <span>Obraz źródłowy</span>
      </div>
      <div class="source-wrap">
        <img src="assets/PD_93_original.jpg" alt="PD (93).jpg">
      </div>
    </section>

    <section class="right">
      <section class="panel">
        <div class="panel-header">Metadane próbki</div>
        <div class="meta">
          <div class="field">
            <label>Plik</label>
            <input value="PD (93).jpg" readonly>
          </div>
          <div class="field">
            <label>Grupa</label>
            <input value="PD" readonly>
          </div>
          <div class="field">
            <label>Tekst</label>
            <input value="t3" readonly>
          </div>
          <div class="field">
            <label>Liczba linii</label>
            <input value="4" readonly>
          </div>
        </div>
      </section>

      <section class="panel lines">
        <div class="panel-header">
          <span>Linie</span>
          <span>4/4 opisane</span>
        </div>
        <div class="line-list">
          <article class="line-card">
            <div class="line-title">
              <span>PD_93_t3_l1.png</span>
            </div>
            <div class="line-body">
              <img src="assets/PD_93_t3_l1.png" alt="PD_93_t3_l1">
              <textarea>Saya suka bermain basikal pada</textarea>
            </div>
          </article>

          <article class="line-card">
            <div class="line-title">
              <span>PD_93_t3_l2.png</span>
            </div>
            <div class="line-body">
              <img src="assets/PD_93_t3_l2.png" alt="PD_93_t3_l2">
              <textarea>waktu lapang. Basikal itu dibeli</textarea>
            </div>
          </article>

          <article class="line-card">
            <div class="line-title">
              <span>PD_93_t3_l3.png</span>
            </div>
            <div class="line-body">
              <img src="assets/PD_93_t3_l3.png" alt="PD_93_t3_l3">
              <textarea>oleh ayah saya. Roda basikal saya</textarea>
            </div>
          </article>

          <article class="line-card">
            <div class="line-title">
              <span>PD_93_t3_l4.png</span>
            </div>
            <div class="line-body">
              <img src="assets/PD_93_t3_l4.png" alt="PD_93_t3_l4">
              <textarea>berwarna hijau dan putih.</textarea>
            </div>
          </article>
        </div>
        <div class="actions">
          <button>Zapisz adnotacje</button>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
